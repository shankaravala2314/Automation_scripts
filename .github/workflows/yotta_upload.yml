name: Yotta Upload Workflow

on:
  push:
    branches:
      - main

jobs:
  upload-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Give Execute Permission
        run: chmod +x scripts/upload_to_yotta_s3.sh

      - name: Run Upload Script
        run: ./scripts/upload_to_yotta_s3.sh